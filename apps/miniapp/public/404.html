<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect for GitHub Pages: rewrites path to query string so index.html can restore it
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + "/motivaton/" + "?p=" + encodeURIComponent(path.replace("/motivaton/", ""))
      );
    </script>
  </head>
</html>
